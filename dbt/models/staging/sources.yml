version: 2

sources:
  - name: raw
    database: MARKETING_ANALYTICS
    schema: RAW
    description: Bronze layer — raw CSV data loaded as-is from ad platforms.

    tables:
      - name: META_ADS
        description: Raw Meta (Facebook/Instagram) ad performance data.
        columns:
          - name: date
            tests:
              - not_null
          - name: ad_set_id
            tests:
              - not_null

      - name: GOOGLE_ADS
        description: Raw Google Ads performance data.
        columns:
          - name: date
            tests:
              - not_null
          - name: ad_set_id
            tests:
              - not_null

      - name: TIKTOK_ADS
        description: Raw TikTok Ads performance data.
        columns:
          - name: date
            tests:
              - not_null
          - name: ad_set_id
            tests:
              - not_null

      - name: CUSTOMER_FEEDBACK
        description: >
          Raw, unstructured customer feedback (reviews / social comments) loaded
          as-is. Deliberately messy — dirty dates, inconsistent source labels,
          mixed-format ratings, multilingual free text. Enriched by the LLM layer
          downstream. `true_campaign_id` is a synthetic ground-truth label used
          only to measure resolution accuracy; the enrichment step never reads it.
        columns:
          - name: feedback_id
            description: Unique identifier for each feedback record.
            tests:
              - not_null
              - unique
          - name: review_text
            description: The free-text comment — the only field guaranteed present.
            tests:
              - not_null
