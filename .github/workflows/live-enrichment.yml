name: Live enrichment (manual)

# Occasional, manually-triggered job that calls the real Gemini API to (re)enrich
# feedback and refresh the committed fixture. Kept separate from CI on purpose:
#   - CI must be deterministic and key-free -> it replays the fixture (offline).
#   - This job is the only place that spends API quota, and only on demand.
# The refreshed fixture is uploaded as an artifact for review; commit it back via a
# PR rather than auto-committing, so fixture changes are reviewable.

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Gemini model to use"
        default: "gemini-2.5-flash"
        required: false

jobs:
  enrich:
    name: live enrich + refresh fixture
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install dbt-duckdb duckdb python-dotenv pydantic google-genai

      - name: Generate data + load Bronze
        run: |
          python ingestion/simulate_ad_data.py
          python ingestion/simulate_feedback_data.py
          python ingestion/load_to_warehouse.py --truncate

      - name: Live enrichment (Gemini)
        env:
          GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
        run: python enrichment/enrich_feedback.py --model "${{ inputs.model }}" --batch-size 120

      - name: Upload refreshed fixture
        uses: actions/upload-artifact@v4
        with:
          name: feedback-enrichment-fixture
          path: enrichment/fixtures/feedback_enrichment.jsonl
