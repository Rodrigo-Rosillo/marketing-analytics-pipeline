name: Deploy — dbt docs (DuckDB)

# On merge to main, rebuild the pipeline on DuckDB and publish the dbt docs site
# (lineage + column-level docs) to GitHub Pages. Keyless — no warehouse account
# required, so docs stay live regardless of the Snowflake prod target.

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    name: build pipeline & generate docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install dbt-duckdb duckdb python-dotenv pydantic

      - name: Generate synthetic data
        run: |
          python ingestion/simulate_ad_data.py
          python ingestion/simulate_feedback_data.py

      - name: Load Bronze + enrich (offline)
        run: |
          python ingestion/load_to_warehouse.py --truncate
          python enrichment/enrich_feedback.py --offline

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt build + docs generate
        working-directory: dbt
        run: |
          dbt build --profiles-dir . --target dev
          dbt docs generate --profiles-dir . --target dev

      - name: Upload docs to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dbt/target

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
