name: CI — full pipeline (DuckDB)

# Runs the entire pipeline end to end on DuckDB with NO secrets and NO network:
# generate data -> load -> LLM-enrich from the committed fixture (offline) ->
# dbt build (all models, snapshot, and data-quality tests). Because enrichment
# replays the fixture, the non-deterministic LLM step is fully reproducible here.

on:
  pull_request:
    branches: [main]

jobs:
  pipeline:
    name: build & test on DuckDB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install dbt-duckdb duckdb python-dotenv pydantic

      - name: Generate synthetic data
        run: |
          python ingestion/simulate_ad_data.py
          python ingestion/simulate_feedback_data.py

      - name: Load Bronze (DuckDB)
        run: python ingestion/load_to_warehouse.py --truncate

      - name: Enrich feedback (offline — replay fixture, no API key)
        run: python enrichment/enrich_feedback.py --offline

      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps

      - name: dbt build (all models, snapshot, tests)
        working-directory: dbt
        run: dbt build --profiles-dir . --target dev
